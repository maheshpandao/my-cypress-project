name: Cypress Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Run tests in parallel across 3 machines
        containers: [1, 2, 3]

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run Cypress tests (headless Chrome) ────────────────────────────
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          # Change this to your app start command, or remove if testing a live URL
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60
        env:
          # Add any environment variables your tests need
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'http://localhost:3000' }}
          # If using Cypress Cloud for parallelisation, add your key:
          # CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      # ── 5. Upload screenshots on failure ──────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots
          retention-days: 7

      # ── 6. Upload videos (always, so you can review slow tests) ───────────
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: cypress/videos
          retention-days: 7